# Use this file if github.com/trucklinemp/sdk is a standalone repo
# (repo root = package root). For the monorepo, use
# /.github/workflows/publish-sdk.yml instead.
#
# Secret: NPM_TOKEN (npm Automation token for the trucklinemp account)

name: Publish to npm

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@trucklinemp"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish to npm if version is new
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "Package: $NAME@$VERSION"

          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "Already published. Skipping."
            exit 0
          fi

          npm publish --access public
          echo "Published ${NAME}@${VERSION}"
